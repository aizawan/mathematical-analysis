<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">ニュートンの運動方程式の模式図</title>
  <desc id="desc">水平な床の上にある質量 m の物体に右向きの力 F が加わり，右向きの加速度 a が生じる様子。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5fbf"/>
    </marker>
  </defs>

  <rect width="720" height="240" fill="#fff"/>
  <line x1="70" y1="170" x2="650" y2="170" stroke="#444" stroke-width="2"/>
  <line x1="80" y1="170" x2="80" y2="192" stroke="#444" stroke-width="2"/>
  <line x1="80" y1="192" x2="650" y2="192" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="652" y="197" font-family="sans-serif" font-size="22" fill="#222">x</text>

  <rect x="255" y="98" width="140" height="72" rx="4" fill="#f7f7f7" stroke="#222" stroke-width="3"/>
  <text x="325" y="142" text-anchor="middle" font-family="serif" font-size="28" fill="#222">m</text>

  <line x1="135" y1="134" x2="245" y2="134" stroke="#222" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="185" y="118" text-anchor="middle" font-family="serif" font-size="28" fill="#222">F</text>

  <line x1="395" y1="82" x2="525" y2="82" stroke="#1f5fbf" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-blue)"/>
  <text x="464" y="64" text-anchor="middle" font-family="serif" font-size="24" fill="#1f5fbf">a = F/m</text>

  <line x1="325" y1="170" x2="325" y2="185" stroke="#444" stroke-width="2"/>
  <text x="325" y="216" text-anchor="middle" font-family="serif" font-size="22" fill="#222">x(t)</text>
</svg>
